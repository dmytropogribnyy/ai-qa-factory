name: Diagnose Ruff PR39

on:
  pull_request:
    branches: [main]
    paths:
      - 'core/scout/config.py'
      - 'tests/test_scout_video_capture.py'
      - '.github/workflows/diagnose-ruff-pr39.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install 'ruff==0.15.22'
      - name: Capture pinned Ruff result
        shell: bash
        run: |
          set +e
          {
            python -m ruff --version
            python -m ruff check .
            code=$?
            echo "exit_code=$code"
          } > ruff-output.txt 2>&1
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr39-ruff-output
          path: ruff-output.txt
          if-no-files-found: error
