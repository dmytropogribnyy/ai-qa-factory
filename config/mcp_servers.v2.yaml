# ARK MCP Server Manifest v2 — Final Phase II integration audit (references only).
#
# SAFETY CONTRACT (non-negotiable, unchanged from v1):
# - References ONLY. No tokens/keys/cookies/secret URLs are ever stored here.
# - `auth_ref` is an ENVIRONMENT VARIABLE NAME, never a value.
# - `enabled: false` for EVERY server (disabled by default). Nothing is invoked from this file.
# - A manifest entry is NOT a working integration. Readiness is honest:
#   declared_in_manifest < health_checked < tools_discovered < configured < sandbox_accepted < live_accepted.
# - Read-only by default; write/external-communication/financial tools are approval-gated.
# - `integration_class` marks WHO may use it. `developer_agent_only` servers are available to the
#   VS Code / Claude agent ONLY, never to the standalone Factory process. Assuming otherwise is a
#   confirmed adversarial defect (see tests).
# - The primary host is Windows; VS Code MCP sandboxing is NOT the security boundary. Tool
#   allowlists, read-only defaults, env-secret references, version pinning, process isolation, and
#   domain/filesystem allowlists are the boundary.
#
# integration_class: developer_agent_only | optional_factory_runtime | external_communication |
#                    deployment_only | post_v2_candidate

version: 2
schema_version: "2.0"
default_enabled: false
default_mode: read_only

servers:
  - id: context7
    publisher: Upstash
    source: "https://github.com/upstash/context7-mcp"
    version_policy: pinned
    transport: stdio
    auth_ref: ""
    enabled: false
    integration_class: developer_agent_only
    capability_classes: [read]
    toolsets: [resolve-library-id, query-docs]
    fs_roots: []
    network_domains: ["context7.com"]
    readiness: declared_in_manifest
    cost: free
    terms_review: not_reviewed
    telemetry: unknown
    available_to_factory_process: false
    fallback_runner: "internal docs lookup"
    approval_required: false

