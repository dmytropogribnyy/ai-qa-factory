    toolsets: [browser_navigate, browser_snapshot, browser_click]
    fs_roots: []
    network_domains: ["*"]
    readiness: declared_in_manifest
    cost: free
    terms_review: not_reviewed
    telemetry: unknown
    available_to_factory_process: false
    fallback_runner: "deterministic Scout Playwright/CLI runtime (core/scout/pipeline/browser_qa.py)"
